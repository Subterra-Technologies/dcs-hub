# Headscale server config. Rendered by setup.sh.
#
# Exposed to the internet via Cloudflare Tunnel; Cloudflare terminates TLS
# at its edge with its own cert. Headscale itself serves plain HTTP on
# loopback. No direct public port on this VM.

server_url: https://{{HOSTNAME}}
listen_addr: 127.0.0.1:8080
metrics_listen_addr: 127.0.0.1:9090
grpc_listen_addr: 127.0.0.1:50443
grpc_allow_insecure: true

prefixes:
  v4: 100.64.0.0/10
  v6: fd7a:115c:a1e0::/48
  allocation: sequential

# Tailscale's public DERP mesh. Fallback relay when direct UDP fails.
# Traffic is end-to-end encrypted; DERP only carries ciphertext.
derp:
  urls:
    - https://controlplane.tailscale.com/derpmap/default
  auto_update_enabled: true
  update_frequency: 24h

disable_check_updates: false
ephemeral_node_inactivity_timeout: 30m

database:
  type: sqlite
  sqlite:
    path: /var/lib/headscale/db.sqlite

# TLS disabled — Cloudflare handles it. Headscale speaks HTTP to cloudflared,
# cloudflared speaks HTTPS to Cloudflare edge, client gets Cloudflare cert.
# (If you ever run without CF tunnel, restore tls_letsencrypt_* here.)

pre_auth_key_default_duration: 72h  # 3 days; tighter than default

log:
  level: info
  format: text

policy:
  mode: file
  path: /etc/headscale/acl.hujson

dns:
  magic_dns: true
  base_domain: subterra.internal
  nameservers:
    global:
      - 1.1.1.1
      - 9.9.9.9

unix_socket: /var/run/headscale/headscale.sock
unix_socket_permission: "0770"
